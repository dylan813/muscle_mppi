# muscle_mppi task configuration — edit here, no rebuild needed.
# Run the binary from build/: model_path is relative to the working directory.
#
# Joint order for all 16-element arrays (LowState / actuator order):
#   0-2:  FR (hip, thigh, calf)    3-5:  FL (hip, thigh, calf)
#   6-8:  RR (hip, thigh, calf)    9-11: RL (hip, thigh, calf)
#   12: FR_wheel  13: FL_wheel  14: RR_wheel  15: RL_wheel

