# -----------------------------------------------------------------------
stand:
  model_path:   "../../unitree_mujoco/unitree_robots/go2w/scene.xml"
  height_target: 0.0   # overwritten at runtime from measured trunk height
  n_samples:    16
  horizon:      25
  substeps:     10
  n_iterations: 3
  lambda:       0.1
  beta1:        3.0
  beta2:        3.0
  dt:           0.002

  cost:
    height:        100.0
    orientation:    10.0
    posture:         5.0
    contact_vel:     0.5
    contact_force:   0.0
    terminal:     2500.0
    act_effort:     0.01
    act_reference:   0.0
    vel_cmd:         0.0
    vel_des:       [0.0, 0.0, 0.0]

  nominal_pose: [0.0, 0.67, -1.3, 0.0, 0.67, -1.3, 0.0, 0.67, -1.3, 0.0, 0.67, -1.3, 0.0, 0.0, 0.0, 0.0]
  noise_sigma:  [0.05, 0.08, 0.08, 0.05, 0.08, 0.08, 0.05, 0.08, 0.08, 0.05, 0.08, 0.08, 0.15, 0.15, 0.15, 0.15]

  muscle: *default_muscle

# -----------------------------------------------------------------------
walk_forward:
  model_path:   "../../unitree_mujoco/unitree_robots/go2w/scene.xml"
  height_target: 0.0
  n_samples:    16
  horizon:      25
  substeps:     10
  n_iterations: 3
  lambda:       0.1
  beta1:        3.0
  beta2:        3.0
  dt:           0.002

  cost:
    height:        100.0
    orientation:    10.0
    posture:         0.0   # disabled — walking moves joints away from nominal
    contact_vel:     0.5
    contact_force:   0.05
    terminal:     2500.0
    act_effort:     0.01
    act_reference:   1.0   # enabled — no-op unless a CSV is loaded
    vel_cmd:         1.0
    vel_des:       [0.5, 0.0, 0.0]  # 0.5 m/s forward

  nominal_pose: [0.0, 0.67, -1.3, 0.0, 0.67, -1.3, 0.0, 0.67, -1.3, 0.0, 0.67, -1.3, 0.0, 0.0, 0.0, 0.0]
  noise_sigma:  [0.05, 0.08, 0.08, 0.05, 0.08, 0.08, 0.05, 0.08, 0.08, 0.05, 0.08, 0.08, 0.15, 0.15, 0.15, 0.15]

